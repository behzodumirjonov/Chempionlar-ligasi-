version: '3.8'

services:
  backend:
    build: ./backend
    container_name: champions-league-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./backend:/app
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: champions-league-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
    command: npm start
    depends_on:
      - backend

volumes:
  backend:
  frontend:

networks:
  default:
    name: champions-league-network
